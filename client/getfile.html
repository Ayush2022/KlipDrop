<!DOCTYPE html>
<html>
<head>
<title>Retrieve File</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-gray-800 p-8 rounded-xl w-full max-w-md text-center">

<h1 class="text-2xl font-bold mb-4">Retrieve File 📁</h1>

<input id="code" placeholder="Enter Code"
class="w-full p-3 rounded bg-gray-900 border border-gray-700 mb-3">

<input id="password" placeholder="Password (if any)"
class="w-full p-3 rounded bg-gray-900 border border-gray-700 mb-3">

<button onclick="getFile()"
class="bg-purple-500 w-full p-3 rounded">
Get File
</button>

<p id="timer" class="text-red-400 mt-3"></p>

</div>

<script>
const API_URL = "https://clipdrop-lio8.onrender.com";

async function getFile(){

    const code = document.getElementById("code").value;
    const password = document.getElementById("password").value;

    const res = await fetch(API_URL + "/get/" + code + "?password=" + password);
    const data = await res.json();

    if(data.message){
        alert(data.message);
        return;
    }

    // open file
    window.open(API_URL + data.text);

    // timer
    const expiryTime = new Date(data.createdAt).getTime() + 600000;

    setInterval(() => {

        const diff = expiryTime - Date.now();

        if(diff <= 0){
            document.getElementById("timer").innerText = "Expired";
            return;
        }

        const min = Math.floor(diff / 60000);
        const sec = Math.floor((diff % 60000)/1000);

        document.getElementById("timer").innerText =
        `Expires in ${min}:${sec}`;

    }, 1000);
}

window.addEventListener("load", function(){

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if(!code) return;

    const input = document.getElementById("code");

    if(input){
        input.value = code;

        // auto fetch file
        getFile();
    }

});
</script>

</body>
</html>
