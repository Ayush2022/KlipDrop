<!DOCTYPE html>
<html>
<head>

<title>KlipDrop</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

<div class="bg-gray-800 p-6 sm:p-8 rounded-xl shadow-xl w-full max-w-xl">

<h1 class="text-3xl font-bold text-center mb-6">Retrieve Text</h1>

<input
id="code"
placeholder="Enter Code"
class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 text-center">

<button
onclick="getText()"
class="mt-4 w-full bg-green-500 hover:bg-green-600 p-3 rounded-lg font-semibold text-lg">

Get Text

</button>

<textarea
id="output"
class="w-full h-40 p-3 rounded-lg bg-gray-900 border border-gray-700 mt-4"></textarea>
<p id="timer" class="text-red-400 mt-2 text-center"></p>

<button
onclick="copyText()"
class="mt-4 w-full bg-blue-500 hover:bg-blue-600 p-3 rounded-lg font-semibold text-lg">

Copy Text

</button>

</div>

<script src="./script.js"></script>

<footer class="fixed bottom-6 left-1/2 transform -translate-x-1/2 text-center text-gray-400 text-sm">

Made with ❤️ by <span class="text-white font-semibold">Ayush</span>

<div class="mt-2 flex justify-center gap-5 text-lg">

<a href="https://github.com/Ayush2022" target="_blank" class="hover:text-white">
<i class="fab fa-github"></i>
</a>

<a href="https://www.linkedin.com/in/ayush-kar-a5a9793b6" target="_blank" class="hover:text-white">
<i class="fab fa-linkedin"></i>
</a>

<a href="https://www.instagram.com/ay.uxhh_/" target="_blank" class="hover:text-white">
<i class="fab fa-instagram"></i>
</a>

</div>

</footer>

</body>
</html>
