<!DOCTYPE html>
<html>
<head>

<title>ClipDrop</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

<div class="bg-gray-800 p-6 sm:p-8 rounded-xl shadow-xl w-full max-w-xl">

<h1 class="text-3xl font-bold text-center mb-6">Retrieve Text</h1>

<input
id="code"
placeholder="Enter Code"
class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 text-center">

<button
onclick="getText()"
class="mt-4 w-full bg-green-500 hover:bg-green-600 p-3 rounded-lg font-semibold text-lg">

Get Text

</button>

<textarea
id="output"
class="w-full h-40 p-3 rounded-lg bg-gray-900 border border-gray-700 mt-4"></textarea>

<button
onclick="copyText()"
class="mt-4 w-full bg-blue-500 hover:bg-blue-600 p-3 rounded-lg font-semibold text-lg">

Copy Text

</button>

</div>

<script src="script.js"></script>

<footer class="fixed bottom-6 w-full text-center text-gray-400 text-sm">
Made with ❤️ by <span class="text-white font-semibold">Ayush</span>
</footer>

</body>
</html>
