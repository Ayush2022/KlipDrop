<!DOCTYPE html>
<html>
<head>

<title>ClipDrop</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

<div class="bg-gray-800 p-6 sm:p-8 rounded-xl shadow-xl w-full max-w-xl">

<h1 class="text-3xl font-bold text-center mb-4">Paste Text</h1>

<textarea
id="text"
class="w-full h-40 p-3 rounded-lg bg-gray-900 border border-gray-700"
placeholder="Paste your text here"></textarea>

<button
onclick="pasteText()"
class="mt-4 w-full bg-blue-500 hover:bg-blue-600 p-3 rounded-lg font-semibold text-lg">
Generate Code
</button>

<button
onclick="updateText()"
class="mt-2 bg-green-500 px-4 py-2 rounded-lg">
Update Text
</button>

<div id="result" class="mt-6 text-center"></div>

<canvas id="qrcode" class="mx-auto mt-4"></canvas>

</div>

<script src="script.js"></script>

<footer class="fixed bottom-6 left-1/2 transform -translate-x-1/2 text-center text-gray-400 text-sm">

Made with ❤️ by <span class="text-white font-semibold">Ayush</span>

<div class="mt-2 flex justify-center gap-5 text-lg">

<a href="https://github.com/Ayush2022" target="_blank" class="hover:text-white">
<i class="fab fa-github"></i>
</a>

<a href="https://linkedin.com/in/YOUR-LINKEDIN" target="_blank" class="hover:text-white">
<i class="fab fa-linkedin"></i>
</a>

<a href="https://www.instagram.com/ay.uxhh_/" target="_blank" class="hover:text-white">
<i class="fab fa-instagram"></i>
</a>

</div>

</footer>

</body>
</html>
